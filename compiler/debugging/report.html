<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fparser2 AST Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; background-color: #f8f9fa; }
        #controls { position: absolute; top: 10px; left: 10px; z-index: 10; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        svg { width: 100vw; height: 100vh; cursor: grab; }
        svg:active { cursor: grabbing; }
        .node circle { fill: #fff; stroke: #4285F4; stroke-width: 2px; cursor: pointer; }
        .node text { font-size: 12px; font-family: monospace; }
        .node--internal text { text-shadow: 0 1px 3px rgba(255,255,255,0.8); }
        .link { fill: none; stroke: #ccc; stroke-width: 1.5px; }
        .value-text { fill: #d93025; font-size: 11px; }
    </style>
</head>
<body>

    <div id="controls">
        <strong>Fortran AST Viewer</strong><br><br>
        <input type="file" id="file-input" accept=".json" />
    </div>

    <svg id="ast-svg"></svg>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;
        const margin = {top: 20, right: 120, bottom: 20, left: 120};

        const svg = d3.select("#ast-svg");
        const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        // Setup Zoom & Pan
        const zoom = d3.zoom().scaleExtent([0.1, 3]).on("zoom", (event) => {
            g.attr("transform", event.transform);
        });
        svg.call(zoom);

        // VERTICAL SPACING: Increased to 45 so nodes don't stack on top of each other
        const treeLayout = d3.tree().nodeSize([45, 200]);
        let root;
        let i = 0; 

        // Handle File Upload
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    renderTree(data);
                } catch (err) {
                    alert("Error loading tree: " + err.message);
                }
            };
            reader.readAsText(file);
        });

        function renderTree(treeData) {
            g.selectAll("*").remove(); // Clear previous
            
            root = d3.hierarchy(treeData, d => d.children);
            root.x0 = height / 2;
            root.y0 = 0;

            // Collapse all nodes past depth 1 by default for performance
            root.descendants().forEach((d, index) => {
                d.id = index;
                d._children = d.children;
                if (d.depth > 1) d.children = null;
            });

            update(root);
            
            // Center the root
            svg.transition().duration(750).call(
                zoom.transform, 
                d3.zoomIdentity.translate(margin.left, height / 2).scale(1)
            );
        }

        function update(source) {
            const treeData = treeLayout(root);
            const nodes = treeData.descendants();
            const links = treeData.links();

            // HORIZONTAL SPACING: Increased to 450 to accommodate long Fortran strings
            nodes.forEach(d => d.y = d.depth * 450); 

            // ****************** Nodes section ***************************
            const node = g.selectAll('g.node')
                .data(nodes, d => d.id || (d.id = ++i));

            const nodeEnter = node.enter().append('g')
                .attr('class', 'node')
                .attr("transform", d => `translate(${source.y0},${source.x0})`)
                .on('click', click);

            nodeEnter.append('circle')
                .attr('r', 1e-6)
                .style("fill", d => d._children ? "#4285F4" : "#fff");

            // Class name text (shifted up slightly)
            nodeEnter.append('text')
                .attr("dy", "-0.3em")
                .attr("x", d => d.children || d._children ? -13 : 13)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .text(d => d.data.name);

            // Leaf value text (shifted down slightly so it doesn't overlap the name)
            nodeEnter.append('text')
                .attr("class", "value-text")
                .attr("dy", "1.2em")
                .attr("x", d => d.children || d._children ? -13 : 13)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .text(d => d.data.value ? `"${d.data.value}"` : "");

            const nodeUpdate = nodeEnter.merge(node);

            nodeUpdate.transition().duration(400)
                .attr("transform", d => `translate(${d.y},${d.x})`);

            nodeUpdate.select('circle')
                .attr('r', 6)
                .style("fill", d => d._children ? "#4285F4" : "#fff");

            const nodeExit = node.exit().transition().duration(400)
                .attr("transform", d => `translate(${source.y},${source.x})`)
                .remove();

            nodeExit.select('circle').attr('r', 1e-6);
            nodeExit.select('text').style('fill-opacity', 1e-6);

            // ****************** Links section ***************************
            const link = g.selectAll('path.link')
                .data(links, d => d.target.id);

            const linkEnter = link.enter().insert('path', "g")
                .attr("class", "link")
                .attr('d', d => {
                    const o = {x: source.x0, y: source.y0};
                    return diagonal(o, o);
                });

            const linkUpdate = linkEnter.merge(link);

            linkUpdate.transition().duration(400)
                .attr('d', d => diagonal(d.source, d.target));

            link.exit().transition().duration(400)
                .attr('d', d => {
                    const o = {x: source.x, y: source.y};
                    return diagonal(o, o);
                })
                .remove();

            // Store old positions for transition
            nodes.forEach(d => {
                d.x0 = d.x;
                d.y0 = d.y;
            });
        }

        // Curved lines connecting nodes
        function diagonal(s, d) {
            return `M ${s.y} ${s.x}
                    C ${(s.y + d.y) / 2} ${s.x},
                      ${(s.y + d.y) / 2} ${d.x},
                      ${d.y} ${d.x}`;
        }

        // Toggle children on click
        function click(event, d) {
            if (d.children) {
                d._children = d.children;
                d.children = null;
            } else {
                d.children = d._children;
                d._children = null;
            }
            update(d);
        }
    </script>
</body>
</html>
